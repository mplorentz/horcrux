name: Tests

on:
  push:
    branches: [main]
  pull_request:
    # Run on all pull requests, regardless of target branch

jobs:
  test:
    name: Run Tests
    runs-on: macos-latest # macOS required for consistent golden test rendering
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Pub cache with fallback
        uses: actions/cache@v4
        id: pub_cache_restore
        with:
          path: ~/.pub-cache
          # Use explicit path instead of wildcard to avoid macOS hashFiles issues
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
            pub-${{ runner.os }}-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: "pubspec.yaml"
          channel: "stable"
          cache: true
          # Use explicit path instead of wildcard to avoid macOS hashFiles issues
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: flutter-pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - name: Save Pub cache (if updated)
        if: steps.pub_cache_restore.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Verify codegen
        # Run codegen and check if generated files changed.
        # Formatting is applied after codegen so generated files are formatted,
        # but format differences between SDK versions are non-blocking since
        # dart_style is SDK-bundled and versions may differ across environments.
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          dart format .
          # Only fail on codegen changes (non-generated file diffs from build_runner)
          # Format-only differences are expected when local and CI SDKs differ
          CHANGED=$(git diff --name-only)
          if [ -n "$CHANGED" ]; then
            echo "::warning ::Formatting/codegen differences detected. Files changed: $CHANGED"
            # Check if any changes are from codegen (generated files)
            CODEGEN_CHANGED=$(git diff --name-only | grep '\.g\.dart\|\.mocks\.dart\|drift_schemas')
            if [ -n "$CODEGEN_CHANGED" ]; then
              echo "::error ::Codegen is out of date. Run 'flutter pub run build_runner build --delete-conflicting-outputs && dart format .' and commit the changes."
              exit 1
            fi
          fi

      - name: Analyze code
        run: flutter analyze

      - name: Verify drift schema dump is up to date
        # Re-runs `dart run drift_dev schema dump` and diffs against the
        # committed `drift_schemas/`. This catches a stale snapshot but does
        # NOT catch re-dumping into drift_schema_vN.json without bumping N;
        # We have `.github/workflows/drift-schema-version.yml` to catch that.
        run: flutter test test/database/schema_parity_test.dart

      - name: Run unit tests
        # Exclude drift-schema: schema parity runs in "Verify drift schema dump" (shells drift_dev).
        run: flutter test --exclude-tags=golden,drift-schema

      - name: Run golden tests
        run: flutter test --tags=golden
        id: golden_tests
        # Note: If this fails, it means the rendered UI doesn't match the committed golden images
        # Developer needs to either:
        # 1. Fix the unintended UI change, OR
        # 2. Update goldens: flutter test test/screens --update-goldens

      - name: Upload golden test failures
        if: failure() && steps.golden_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: golden-test-failures
          path: |
            test/**/failures/
            test/**/goldens/
          retention-days: 7

      - name: Comment on PR with golden test instructions
        if: failure() && steps.golden_tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ⚠️ Golden Tests Failed\n\nThe golden screenshot tests have failed. This could mean:\n\n1. **Intentional UI changes**: If you updated the UI, you need to update the golden files:\n   ```bash\n   flutter test test/screens --update-goldens\n   git add test/screens/goldens/*.png\n   git commit -m "Update golden test screenshots"\n   ```\n\n2. **Unintentional changes**: Review the diff images in the [test artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) to see what changed.\n\n3. **Platform differences**: Golden tests must be generated on macOS. If you\'re on Linux/Windows, ask a macOS team member to regenerate them.\n\n📦 Download the failure artifacts above to see before/after comparisons.'
            })
