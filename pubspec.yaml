name: horcrux
description: "The best way to backup sensitive data."

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+12

environment:
  flutter: 3.35.0
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  local_auth: ^2.3.0
  ndk: ^0.5.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.2
  logger: ^2.4.0
  meta: ^1.11.0
  freezed_annotation: ^2.4.1
  ntcdcrypto: ^0.4.0
  flutter_riverpod: ^2.6.1
  app_links: ^6.4.1
  uuid: ^4.5.1
  package_info_plus: ^8.1.1
  marionette_flutter: ^0.2.0
  flutter_local_notifications: ^18.0.1
  path: ^1.9.0
  path_provider: ^2.1.5
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  crypto: ^3.0.7
  http: ^1.5.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  freezed: ^2.4.7
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0
  golden_toolkit: ^0.15.0
  marionette_mcp: ^0.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FF000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#000000"
    theme_color: "#000000"

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
    - assets/icon/

  # Bundled fonts for consistent rendering in tests and app
  fonts:
    - family: Archivo
      fonts:
        - asset: fonts/Archivo-Regular.ttf
        - asset: fonts/Archivo-Medium.ttf
          weight: 500
    - family: FiraSans
      fonts:
        - asset: fonts/FiraSans-Regular.ttf
    - family: RobotoMono
      fonts:
        - asset: fonts/RobotoMono-Regular.ttf

